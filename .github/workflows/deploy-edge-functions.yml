name: Deploy Supabase Edge Functions
on:
  push:
    branches: ["main"]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch: {}
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy all functions (with retry on transient Supabase errors)
        run: |
          set -e
          functions="phone-check get-data auth-register auth-login session-check progress-sync-v2 friends avatar-upload phone-verify telegram-webhook duels"
          for fn in $functions; do
            echo "=== Deploying $fn ==="
            attempt=1
            until supabase functions deploy "$fn" --no-verify-jwt --project-ref ziqzprosgzevkdfwyotl; do
              if [ "$attempt" -ge 5 ]; then
                echo "::error::Failed to deploy $fn after $attempt attempts"
                exit 1
              fi
              echo "Attempt $attempt for $fn failed, retrying in 20s..."
              attempt=$((attempt + 1))
              sleep 20
            done
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
