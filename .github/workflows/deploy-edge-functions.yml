name: Deploy Supabase Edge Functions
on:
  push:
    branches: ["main"]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch: {}
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy all functions (with retry on transient Supabase errors)
        run: |
          set -e
          functions="progress-sync phone-check get-data auth-register auth-login session-check friends avatar-upload phone-verify telegram-webhook duels auth-reset-password"
          for fn in $functions; do
            echo "=== Deploying $fn ==="
            attempt=1
            until supabase functions deploy "$fn" --no-verify-jwt --project-ref ziqzprosgzevkdfwyotl; do
              if [ "$attempt" -ge 5 ]; then
                echo "::error::Failed to deploy $fn after $attempt attempts"
                exit 1
              fi
              echo "Attempt $attempt for $fn failed, retrying in 30s..."
              attempt=$((attempt + 1))
              sleep 30
            done
            # Space out deploys -- Supabase's deploy API seems to choke after
            # ~5 rapid-fire deploys in the same run ("Failed to set function
            # store" 500s), regardless of which function is 6th in line.
            sleep 15
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
