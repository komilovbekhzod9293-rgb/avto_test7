name: Deploy Supabase Edge Functions
on:
  push:
    branches: ["main"]
    paths:
      - 'supabase/functions/**'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy phone-check
        run: supabase functions deploy phone-check --no-verify-jwt --project-ref ziqzprosgzevkdfwyotl
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Deploy get-data
        run: supabase functions deploy get-data --no-verify-jwt --project-ref ziqzprosgzevkdfwyotl
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
